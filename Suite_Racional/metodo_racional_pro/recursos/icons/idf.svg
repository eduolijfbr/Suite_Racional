<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Ícone IDF: Gráfico de curva -->
  <!-- Fundo do gráfico -->
  <rect x="3" y="3" width="18" height="18" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <!-- Eixos -->
  <line x1="6" y1="18" x2="6" y2="6" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="6" y1="18" x2="19" y2="18" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Curva IDF -->
  <path d="M7 8 Q10 9 12 12 T18 16" fill="none" stroke="#FF9800" stroke-width="2" stroke-linecap="round"/>
  <!-- Pontos na curva -->
  <circle cx="7" cy="8" r="1.5" fill="#FF9800"/>
  <circle cx="12" cy="12" r="1.5" fill="#FF9800"/>
  <circle cx="18" cy="16" r="1.5" fill="#FF9800"/>
  <!-- Texto I -->
  <text x="4" y="5" font-size="4" font-weight="bold" fill="#1565C0">I</text>
  <!-- Texto t -->
  <text x="20" y="21" font-size="4" font-weight="bold" fill="#1565C0">t</text>
</svg>
